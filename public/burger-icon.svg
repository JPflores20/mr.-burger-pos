<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="translate(0, 5)">
    <!-- Bottom Bun -->
    <path fill="#E6A857" d="M 20 80 Q 20 90 30 90 L 70 90 Q 80 90 80 80 Z"/>
    
    <!-- Meat Patty -->
    <rect x="15" y="65" width="70" height="15" rx="7.5" fill="#5E311B"/>
    
    <!-- Cheese (melted dripping) -->
    <path fill="#FFCC00" d="M 15 65 L 85 65 L 85 70 L 75 80 L 65 70 L 55 78 L 45 70 L 35 80 L 25 70 L 15 75 Z"/>
    
    <!-- Tomato Slices -->
    <rect x="20" y="55" width="60" height="10" rx="4" fill="#E23E3E"/>
    <rect x="18" y="55" width="32" height="10" rx="4" fill="#F05050"/>
    <rect x="50" y="55" width="32" height="10" rx="4" fill="#F05050"/>
    
    <!-- Lettuce -->
    <path fill="#54BB42" d="M 10 50 Q 15 40 20 50 T 30 50 T 40 50 T 50 50 T 60 50 T 70 50 T 80 50 T 90 50 V 55 H 10 Z"/>
    
    <!-- Top Bun -->
    <path fill="#E6A857" d="M 15 45 C 15 15, 85 15, 85 45 Z"/>
    
    <!-- Sesame Seeds -->
    <ellipse cx="35" cy="25" rx="2" ry="4" fill="#FFF2D6" transform="rotate(-30 35 25)"/>
    <ellipse cx="50" cy="20" rx="2" ry="4" fill="#FFF2D6"/>
    <ellipse cx="65" cy="25" rx="2" ry="4" fill="#FFF2D6" transform="rotate(30 65 25)"/>
    <ellipse cx="25" cy="35" rx="2" ry="4" fill="#FFF2D6" transform="rotate(-40 25 35)"/>
    <ellipse cx="45" cy="35" rx="2" ry="4" fill="#FFF2D6" transform="rotate(-10 45 35)"/>
    <ellipse cx="55" cy="35" rx="2" ry="4" fill="#FFF2D6" transform="rotate(10 55 35)"/>
    <ellipse cx="75" cy="35" rx="2" ry="4" fill="#FFF2D6" transform="rotate(40 75 35)"/>
  </g>
</svg>
